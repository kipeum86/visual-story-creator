<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Story — Obsidian + Claude Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0A0A0F;
      color: #F0F0F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .accent { color: #7C3AED; }
    .subtitle {
      color: #9CA3AF;
      font-size: 1rem;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 36px;
      background: #13131A;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: #F0F0F5;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.3s;
    }
    a:hover {
      border-color: #7C3AED;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.25);
    }
    .flag { font-size: 1.6rem; }
    .meta {
      margin-top: 48px;
      color: #6B7280;
      font-size: 0.8rem;
    }
    .meta a {
      display: inline;
      padding: 0;
      background: none;
      border: none;
      color: #7C3AED;
      font-size: 0.8rem;
      font-weight: 400;
    }
    .meta a:hover {
      transform: none;
      box-shadow: none;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Obsidian + <span class="accent">Claude Code</span></h1>
    <p class="subtitle">A scrollytelling visual story</p>
    <div class="links">
      <a href="ko.html">
        <span class="flag">&#127472;&#127479;</span>
        Korean
      </a>
      <a href="en.html">
        <span class="flag">&#127468;&#127463;</span>
        English
      </a>
    </div>
    <p class="meta">Built with <a href="https://github.com/kipeum86/visual-story-creator">Visual Story Creator</a></p>
  </div>
</body>
</html>
